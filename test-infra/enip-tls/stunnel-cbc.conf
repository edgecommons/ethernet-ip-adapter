# A DELIBERATELY LEGACY stunnel terminator: TLS 1.2 with ONLY a CBC cipher suite and no GCM/TLS1.3.
# This models pre-1.13 CIP Security firmware (the CBC-only interop boundary, DESIGN-cip-security.md
# §2.4). A GCM-only rustls client cannot negotiate with it, so `enip::connect_tls` fails with the
# typed `NoCipherOverlap` error — proving the legacy failure mode fails typed and loud, not
# confusingly. Fronts the same cpppo server on a separate port.
foreground = yes
debug = 4
pid =

[enip-tls-cbc]
accept = 0.0.0.0:2223
connect = enip-sim:44818
cert = /etc/stunnel/certs/server.pem
key = /etc/stunnel/certs/server.key
# No client-cert requirement here — the handshake never gets that far; the point is suite mismatch.
# Cap at TLS 1.2 (so no TLS 1.3 GCM suites) and offer only a single CBC suite rustls will not accept.
sslVersionMin = TLSv1.2
sslVersionMax = TLSv1.2
ciphers = ECDHE-RSA-AES128-SHA256
