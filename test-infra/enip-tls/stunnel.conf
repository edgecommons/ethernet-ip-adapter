# stunnel TLS terminator fronting the cpppo EtherNet/IP tag server (DESIGN-cip-security.md §5.2).
#
# EtherNet/IP-over-TLS is byte-identical EtherNet/IP inside a standard TLS tunnel on TCP 2221, so a
# stock TLS terminator (OpenSSL) in front of the already-validated cpppo poll target is a faithful
# CIP-Security Phase-1 peer at the exact layer Phase 1 changes — with an INDEPENDENT TLS
# implementation (OpenSSL) carrying an INDEPENDENT EtherNet/IP implementation (cpppo).
foreground = yes
debug = 4
pid =

[enip-tls]
# EtherNet/IP over TLS, spec-current suites (GCM / TLS 1.3) — the interoperable path.
accept = 0.0.0.0:2221
connect = enip-sim:44818
cert = /etc/stunnel/certs/server.pem
key = /etc/stunnel/certs/server.key
# Mutual TLS: require + verify a client certificate against the test CA (CIP Security devices
# require client certs by default — 0x5E attr 9).
CAfile = /etc/stunnel/certs/ca.pem
verify = 2
