# HOST platform pack for EthernetIpAdapter.
#
# Runs the component exactly the way the README's "Run locally (HOST platform, MQTT transport)"
# section does — --platform HOST --transport MQTT <messaging config> -c FILE <config> -t <thing> —
# but containerized, against a throw-away EMQX broker on the compose network.
#
#   docker compose up --build          # build the image (./Dockerfile) and start broker + component
#   docker compose logs -f ethernet-ip-adapter
#   docker compose down -v
#
# Watch the bus (the library publishes the state keepalive automatically):
#   mosquitto_sub -h localhost -p 1883 -t 'ecv1/+/+/+/state' -t 'ecv1/+/+/+/data/#' -v
#
# The device (thing) name defaults to ethernet-ip-adapter-dev; override with THING_NAME=... docker compose up.
name: ethernet-ip-adapter

services:
  # Local MQTT broker — the HOST platform's `messaging.local` target.
  emqx:
    image: emqx/emqx:latest
    container_name: ethernet-ip-adapter-emqx
    ports:
      - "1883:1883"     # MQTT
      - "18083:18083"   # EMQX dashboard (default login admin / public)
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # cpppo Allen-Bradley tag server — the POLL live target (DESIGN §11.1/§11.2). Serves the §11.1 tag
  # layout on TCP 44818. test-configs/config-cpppo.json (adapter: ethernet-ip) points its endpoint here.
  enip-sim:
    image: cpppo/cpppo:latest
    container_name: ethernet-ip-adapter-enip-sim
    command: >
      python -m cpppo.server.enip --address 0.0.0.0:44818 -v
      LINE_SPEED=REAL FILL_TEMP=REAL TANK_LEVEL=REAL PRODUCT_COUNT=DINT
      FILL_SETPOINT=REAL ZONE_TEMPS=REAL[8] MOTOR_RUN=DINT RECIPE=SSTRING
    restart: unless-stopped

  # OpENer sample I/O adapter — the PUSH (class-1 implicit I/O) live target (DESIGN §11.5). Built from
  # test-infra/opener/Dockerfile; serves the exclusive-owner demo assemblies (input 100 / output 150 /
  # config 151). test-configs/config-opener.json (adapter: ethernet-ip, mode: push) points its endpoint here.
  #
  # Class-1 UDP :2222 is bidirectional. On a Linux docker host keep this service and the adapter on the
  # same compose network so the T→O return path is symmetric; the adapter advertises its receive port
  # in the ForwardOpen's T→O Sockaddr Info item, so it never fights OpENer for :2222. (On
  # Docker-Desktop-for-Windows the WSL2 UDP NAT breaks the class-1 return path — run the class-1 leg on
  # a Linux docker host or natively; the protocol-level live proof is crates/enip/tests/live_opener.rs.)
  enip-io-sim:
    build: ./test-infra/opener
    container_name: ethernet-ip-adapter-enip-io-sim
    command: ["eth0"]
    # test-configs/config-opener.json targets the OpENer sample under the host name `opener-sim`
    # (the same name the standalone `docker run --name opener-sim` convention in the Dockerfile /
    # DESIGN §11.5 uses). Expose that alias so the push E2E resolves it on the compose network.
    networks:
      default:
        aliases:
          - opener-sim
    restart: unless-stopped

  # libplctag ab_server — a SECOND, INDEPENDENT Logix poll target (DESIGN §11.6). Built from
  # test-infra/ab-server/Dockerfile (the CIP PLC simulator inside libplctag, MPL-2.0). Reached through a
  # real Unconnected_Send (0x52) route wrapper — the CompactLogix/ControlLogix backplane path cpppo
  # never exercises. Serves Read/Write Named Tag; it does NOT serve tag-list browse (0x55) — that gap is
  # closed by enip-sharp below (§11.7). Bare TCP/CIP (no class-1 UDP), so plain port publishing works on
  # any docker host. Host :44820 to coexist with cpppo (:44818) and OpENer (:44819).
  enip-ab-server:
    build: ./test-infra/ab-server
    container_name: ethernet-ip-adapter-enip-ab-server
    ports: ["44820:44818"]
    restart: unless-stopped

  # EthernetIPSharp — a THIRD, INDEPENDENT EtherNet/IP implementation (C#, MIT) run as a Logix server
  # (DESIGN §11.7). Built from test-infra/ethernetip-sharp/Dockerfile. Its LogixDispatcher/SymbolObject
  # serves Read/Write Named Tag AND — uniquely among the container sims — the Logix tag-LIST service
  # Get_Instance_Attribute_List (0x55) on the Symbol class (0x6B), so it CLOSES the sb/browse gap with a
  # real, non-ours 0x55 implementation. Bare TCP/CIP. Host :44821.
  enip-sharp:
    build: ./test-infra/ethernetip-sharp
    container_name: ethernet-ip-adapter-enip-sharp
    ports: ["44821:44818"]
    restart: unless-stopped

  # stunnel TLS terminator fronting cpppo — the CIP Security Phase-1 (TLS-on-explicit) live target
  # (DESIGN-cip-security.md §5.2). EtherNet/IP-over-TLS is byte-identical EtherNet/IP inside a standard
  # TLS tunnel on TCP 2221, so OpenSSL's stunnel in front of the already-validated cpppo poll target is
  # a faithful peer at the exact layer Phase 1 changes — an INDEPENDENT TLS impl (OpenSSL) carrying an
  # INDEPENDENT EtherNet/IP impl (cpppo). Mutual TLS (verify=2) against the test PKI.
  #
  # First: generate the throwaway test PKI (gitignored) so the container + crates/enip/tests/live_tls.rs
  # share the same certs:   ./test-infra/enip-tls/gen-certs.sh
  # Then bring it up:        docker compose up --build enip-sim enip-tls enip-tls-cbc
  # Then run the live suite: cargo test -p ec-enip --features tls --test live_tls -- --nocapture
  enip-tls:
    build: ./test-infra/enip-tls
    container_name: ethernet-ip-adapter-enip-tls
    command: ["stunnel", "/etc/stunnel/stunnel.conf"]
    depends_on: [enip-sim]
    ports: ["2221:2221"]
    volumes:
      - ./test-infra/enip-tls/certs:/etc/stunnel/certs:ro
    restart: unless-stopped

  # A DELIBERATELY LEGACY CBC-only TLS 1.2 terminator (no GCM/TLS1.3) on :2223 — models pre-1.13 CIP
  # Security firmware (DESIGN-cip-security.md §2.4). A GCM-only rustls client fails to negotiate with
  # it, so live_tls.rs proves the typed `NoCipherOverlap` failure. Fronts the same cpppo server.
  enip-tls-cbc:
    build: ./test-infra/enip-tls
    container_name: ethernet-ip-adapter-enip-tls-cbc
    command: ["stunnel", "/etc/stunnel/stunnel-cbc.conf"]
    depends_on: [enip-sim]
    ports: ["2223:2223"]
    volumes:
      - ./test-infra/enip-tls/certs:/etc/stunnel/certs:ro
    restart: unless-stopped

  ethernet-ip-adapter:
    build:
      context: .
      dockerfile: Dockerfile          # multi-stage: cargo build --release -p ethernet-ip-adapter (workspace)
      # The cargo git dep on the private edgecommons repo needs credentials at build time; pass a
      # token through if your dep source is a git URL:
      #   args:
      #     GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    image: ethernet-ip-adapter:dev
    container_name: ethernet-ip-adapter
    depends_on:
      emqx:
        condition: service_healthy
    # The image ENTRYPOINT is /usr/local/bin/component (the built ethernet-ip-adapter binary); these
    # are the standard runtime CLI args appended to it.
    #
    # Default config.json is the hardware-free `sim` backend. For the LIVE poll E2E against the real
    # cpppo target, swap in test-configs/config-cpppo.json (adapter: ethernet-ip, endpoint enip-sim);
    # for the LIVE push E2E, config-opener.json (endpoint enip-io-sim). Add the matching sim service to
    # `depends_on` when you do.
    command:
      - "--platform"
      - "HOST"
      - "--transport"
      - "MQTT"
      - "/etc/edgecommons/messaging.json"
      - "-c"
      - "FILE"
      - "/etc/edgecommons/test-configs/config.json"
      - "-t"
      - "${THING_NAME:-ethernet-ip-adapter-dev}"
    volumes:
      # The component config source (-c FILE ...). Edit the crate's test-configs/ and restart.
      - ./crates/ethernet-ip-adapter/test-configs:/etc/edgecommons/test-configs:ro
    configs:
      - source: messaging
        target: /etc/edgecommons/messaging.json
    restart: unless-stopped

configs:
  # The --transport MQTT messaging config. crates/ethernet-ip-adapter/test-configs/standalone-messaging.json
  # is the same thing for a bare `cargo run` on your workstation (host: localhost); this inline copy points at the
  # `emqx` service on the compose network instead.
  messaging:
    content: |
      {
        "messaging": {
          "local": {
            "host": "emqx",
            "port": 1883,
            "clientId": "ethernet-ip-adapter-local"
          }
        }
      }
