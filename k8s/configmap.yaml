# Component config for Kubernetes, mounted as a DIRECTORY at /etc/edgecommons so the CONFIGMAP
# source watches the kubelet ..data swap and hot-reloads in-process (no restart). config.json
# carries BOTH the component config AND the messaging block (in-cluster broker via Service DNS).
# Edit this and `kubectl apply -f k8s/` to drive a hot reload. Point host at your broker Service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ethernet-ip-adapter-config
  labels:
    app.kubernetes.io/name: ethernet-ip-adapter
data:
  config.json: |-
    {
      "component": {
        "token": "ethernet-ip-adapter",
        "global": {
          "defaults": { "pollIntervalMs": 5000, "publishMode": "onChange", "batchMs": 0 },
          "timeouts": {
            "connectMs": 5000,
            "requestTimeoutMs": 2000,
            "reconnectBackoffMinMs": 1000,
            "reconnectBackoffMaxMs": 60000
          },
          "healthThresholds": { "staleSignalSecs": 60, "keepaliveProbeIntervalMs": 60000 },
          "metricsIntervalSecs": 60
        },
        "instances": [
          {
            "id": "device-1",
            "adapter": "sim",
            "connection": { "endpoint": "sim://device-1" },
            "pollGroups": [
              {
                "id": "default",
                "pollIntervalMs": 5000,
                "signals": [
                  { "name": "line-speed", "tagPath": "LINE_SPEED", "type": "real" },
                  { "name": "product-count", "tagPath": "PRODUCT_COUNT", "type": "dint" },
                  { "name": "zone-temps", "tagPath": "ZONE_TEMPS", "type": "real", "arrayCount": 8 }
                ]
              }
            ],
            "writes": { "allow": [] }
          }
        ]
      },
      "messaging": {
        "local": {
          "type": "mqtt",
          "host": "emqx.default.svc.cluster.local",
          "port": 1883,
          "clientId": "ethernet-ip-adapter"
        }
      },
      "logging": {
        "level": "INFO"
      }
    }
