name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  ci:
    # Reusable component CI from the org defaults repo (DESIGN §12.4, the file-replicator/
    # telemetry-processor pattern). `secrets: inherit` passes the org-level EDGECOMMONS_READ_TOKEN so
    # cargo can fetch the private edgecommons git dependency; the repo must be on that secret's
    # repository allow-list (org Actions secrets, via the REST API).
    #
    # This repo is a Cargo **virtual workspace** (root Cargo.toml has `[workspace]` and NO `[package]`,
    # D-EIP-17: `crates/enip` + `crates/ethernet-ip-adapter`). In a virtual manifest a bare
    # `cargo build` / `cargo test` / `cargo clippy` at the root operates on ALL members — i.e. the
    # reusable workflow's `cargo build --all-targets` / `cargo test` / `cargo clippy --all-targets`
    # ARE workspace-wide here, covering both crates, without needing an explicit `--workspace`. (The
    # `crates/enip/fuzz` harness is its own separate workspace, so it is correctly excluded from these
    # commands and built only by the `fuzz-smoke` job below.)
    permissions:
      contents: read
    uses: edgecommons/.github/.github/workflows/component-ci.yml@main
    with:
      language: RUST
      # No `rust-features`: the adapter's default feature is `standalone` (dual-broker MQTT, no C
      # toolchain), which is exactly what CI should build/test on Linux. `greengrass` is Linux-only via
      # the C-FFI SDK and is validated on the lab device (DESIGN §12.4), not in this hosted job.
    secrets: inherit

  coverage:
    # The 90%-line coverage gate (NFR / DESIGN §12.1), actually RUN here — the reusable component-ci
    # only does build/test/clippy. Measured WORKSPACE-WIDE (D-EIP-17 folded the protocol crate into
    # the same denominator as the adapter; there is no per-crate carve-out).
    #
    # Option B, the file-replicator discipline (DESIGN §12.2): the untestable live-infra loop DRIVERS
    # are refactored into dedicated, as-thin-as-possible seam files so a file-level exclusion excludes
    # ONLY untestable I/O glue and never launders tested logic — the pure gating/decision logic stays in
    # the covered files and IS unit-tested. Excluded from the denominator, each pinned to a reason:
    #   - `crates/ethernet-ip-adapter/src/supervisor.rs` — the connect→poll/consume→reconnect drivers
    #     (`App::run` / `run_device` / `run_push` / `FacadeEventSink`): they `.await` a live `EdgeCommons`
    #     runtime, a live `DeviceBackend` socket, and the `data()` facade. Backoff math / connectivity /
    #     `apply_pause` / `serve_control_disconnected` / `connect_reason` / `rand01` stay in `app.rs`, tested.
    #   - `crates/ethernet-ip-adapter/src/poll_driver.rs` — `poll_until_disconnected` + `repoll`/publish
    #     glue: the select-loop over a live `DeviceSession` + `data.publish().await`. The gating/batching/
    #     stale/overrun logic it composes lives in `poll.rs` / `publish.rs` and is unit-tested.
    #   - `crates/ethernet-ip-adapter/src/push_driver.rs` — `consume_push` + publish glue: the loop over a
    #     live class-1 `PushSession` stream + `data.publish().await`. `process_frame` is in `push.rs`, tested.
    #   - `crates/ethernet-ip-adapter/src/publish_sink.rs` — the one-function `publish()` seam driving
    #     `data.publish().await`; its pure assembly (`build_update`) is in `publish.rs`, tested.
    #   - `crates/ethernet-ip-adapter/src/eip/live.rs` — the EtherNet/IP live-socket drivers: `EipBackend`'s
    #     TCP `connect` / ForwardOpen `open_push` and the class-1 `EipPushSession` + translator task. The
    #     pure translators (`assembly_to_readings` / `map_lost_reason`), the error classification
    #     (`map_enip_error`), and the codec (`eip/types`) stay in covered files and are unit-tested.
    #   These five are validated by the S7a live cpppo/OpENer integration suites (§11) + the S9 deployed
    #   regression — the analog of how `file-replicator` excludes its `dest/*/client.rs` I/O seams.
    #   - `crates/enip/tests/live_cpppo.rs`, `crates/enip/tests/live_opener.rs` — live-sim-gated suites
    #     (§11.3); they self-skip when their sim port is down.
    #   - `crates/enip/fuzz/**` — libFuzzer harnesses. They EXERCISE covered product code; they are not
    #     product code (§12.2). (Also a separate workspace, so not even built here — belt-and-suspenders.)
    #   - `crates/ethernet-ip-adapter/src/testutil.rs` — `#[cfg(test)]`-only recording test doubles.
    # NOTHING ELSE is excluded. The protocol crate's live-socket runtime (`enip/io.rs`'s class-1 UDP
    # manager, `client/io_service.rs`, `client/mod.rs`'s TCP connect) and the binary entry `main.rs` stay
    # INSIDE the denominator — counted AGAINST the gate, not laundered out — and the well-tested codec
    # keeps the aggregate comfortably over 90% (last local run: 93.5%). Do NOT add exclusions to dodge the
    # gate — add tests (DESIGN §12.2).
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Authenticate to the private edgecommons git dependency
        env:
          # Same org read token the reusable workflow uses (secrets: inherit); the repo must be on that
          # secret's allow-list. Rewrites the https git URL so cargo can fetch the private dep. (The
          # `enip` crate has no edgecommons dep, but the adapter crate does — D-EIP-17.)
          EDGECOMMONS_READ_TOKEN: ${{ secrets.EDGECOMMONS_READ_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/edgecommons/edgecommons.git".insteadOf \
            "https://github.com/edgecommons/edgecommons.git"
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/edgecommons/edgecommons".insteadOf \
            "https://github.com/edgecommons/edgecommons"
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      - name: Coverage gate (90% lines, workspace-wide; thin live-infra seams + live suites + fuzz + doubles excluded)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: >
          cargo llvm-cov --workspace
          --ignore-filename-regex '(supervisor\.rs|poll_driver\.rs|publish_sink\.rs|push_driver\.rs|eip[/\\]live\.rs|tests[/\\]live_(cpppo|opener)\.rs|testutil\.rs|fuzz[/\\])'
          --fail-under-lines 90
          --cobertura --output-path target/cobertura.xml

  fuzz-smoke:
    # Decoder fuzzing as a release gate (D-EIP-19 / PROTOCOL-DESIGN §12.3): a reproducible panic/OOM
    # found by fuzzing is a ship blocker. Runs on every PR with a SHORT budget (a smoke, not a
    # campaign — longer runs are a periodic job). The `crates/enip/fuzz` harness is a separate
    # workspace with NO edgecommons dependency (the protocol crate knows nothing about EdgeCommons,
    # D-EIP-17), so this job needs no private-git token.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly toolchain (libFuzzer needs nightly + the sanitizer runtime)
        run: rustup toolchain install nightly --profile minimal --component llvm-tools-preview
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cargo-fuzz
      - name: Build every fuzz target (a target that stops compiling is a defect)
        working-directory: crates/enip
        run: cargo +nightly fuzz build
      - name: Smoke-run representative targets over the checked-in corpus + regressions
        working-directory: crates/enip
        # Three targets spanning the highest-value hostile surfaces (§12.3): TCP framing, the runt
        # class-1 datagram gauntlet (the EIPScanner bug class D-EIP-1 calls out), and MR replies with
        # extended-status size lies. -max_total_time keeps each a short smoke; the whole PR-gate fuzz
        # cadence is intentionally cheap. A crash exits non-zero and is committed as a regression input.
        run: |
          for target in fuzz_encap_frame fuzz_io_frame fuzz_message_reply; do
            echo "::group::fuzz smoke: $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=30
            echo "::endgroup::"
          done
